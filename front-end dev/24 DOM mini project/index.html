<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="container">
            <h1>DOOM CLOCK</h1>
            <p>This clock shows the time until the end of the world.</p>
            <div class="clock-container">
                <img src="./asset/clockface.png" alt="Clock Face">
                <div class="hand" id="hourhand"></div>
                <div class="hand" id="minhand"></div>
                <div class="hand" id="sechand"></div>
            </div>
            <h2 id="time">
                <span id="hour" >00</span> Hours
                <span id="minute">00</span> Minutes
                <span id="second">00</span> Seconds
            </h2>
        </div>
    </main>


    <script src="script.js"></script>
</body>

</html>
