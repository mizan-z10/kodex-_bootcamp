<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Status Viewer</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>

</head>

<body>

<div class="card">

    <!-- Full preview -->
    <div class="full-preview">
        <div class="progress-bar">
            <div class="progress"></div>
        </div>

        <i id="close" class="ri-close-fill"></i>
    </div>


    <!-- Scrollable Status List -->
    <div class="status-list">


        <div class="statuss">
            <img src="https://images.unsplash.com/photo-1458134580443-fbb0743304eb?w=500">
            <div class="status-info">
                <h2>Ayesha</h2>
                <p>Online</p>
            </div>
        </div>


        <div class="statuss">
            <img src="https://images.unsplash.com/photo-1726303827945-9c6e9c3a1a63?w=500">
            <div class="status-info">
                <h2>Zoya</h2>
                <p>1 hour ago</p>
            </div>
        </div>


        <div class="statuss">
            <img src="https://images.unsplash.com/photo-1527345925176-fbb4fd90033e?w=500">
            <div class="status-info">
                <h2>Sana</h2>
                <p>Online</p>
            </div>
        </div>


        <div class="statuss">
            <img src="https://t4.ftcdn.net/jpg/04/72/80/63/240_F_472806370_OgZr4kCleOkbbZcYPSyuo7t2RFNhnDNK.jpg">
            <div class="status-info">
                <h2>Fatima</h2>
                <p>5 minutes ago</p>
            </div>
        </div>


        <div class="statuss">
            <img src="https://t3.ftcdn.net/jpg/04/92/60/10/240_F_492601041_Z86pjnczgqHzLiykuY1diGxliZtDEnRN.jpg">
            <div class="status-info">
                <h2>Meera</h2>
                <p>Online</p>
            </div>
        </div>


        <div class="statuss">
            <img src="https://t4.ftcdn.net/jpg/19/24/52/33/240_F_1924523363_TfmsS3FpN26NuVlwGXWCa8GWw6sEDaoA.jpg">
            <div class="status-info">
                <h2>Ira</h2>
                <p>2 hours ago</p>
            </div>
        </div>


        <div class="statuss">

                <h2>Noor</h2>

            <div class="status-info">
                <h2>Anaya</h2>
                <p>3 hours ago</p>
            </div>
        </div>


    </div>

</div>

<script src="script.js"></script>

</body>
</html>
